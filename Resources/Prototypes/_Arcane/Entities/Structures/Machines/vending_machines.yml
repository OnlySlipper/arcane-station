- type: entity
  parent: VendingMachine
  id: VendingMachineDressMate
  name: DressMate
  description: A vending machine stocked with elegant dresses and feminine clothing.
  components:
  - type: VendingMachine
    pack: DressMateInventory
    offState: off
    brokenState: broken
    normalState: off
  - type: Sprite
    sprite: _Arcane/Structures/Machines/VendingMachines/dressmat.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#FF69B4"
